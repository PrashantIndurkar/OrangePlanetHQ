name: Keep Services Alive

on:
  schedule:
    # Run every 14 minutes
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API Server
        run: |
          curl -f "https://stride-api-sfie.onrender.com/health" || echo "Ping failed or API is sleeping, but request was sent"
      - name: Ping Web Server
        run: |
          curl -f "https://stride-web-kldi.onrender.com" || echo "Ping failed or Web is sleeping, but request was sent"
