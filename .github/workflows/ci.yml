name: CI

on:
  push:
    branches:
      - main
      - master
      - dev
      - ci/github-actions
      - ci/gh-actions-automation
  pull_request:
    branches:
      - main
      - master
      - dev

jobs:
  test:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: stried_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c482612502758296a8040a44 # v4.1.0
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@fe630006501f22ad866a2f7823e7203b5f7e6f88 # v4.0.0
        with:
          version: 11.5.3

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@d4323d4df104b026a6aa033f2736184920677579 # v4.2.2
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run Linting
        run: pnpm run lint

      - name: Generate Prisma Client
        run: pnpm --filter api exec prisma generate

      - name: Setup Database Schema
        run: pnpm --filter api exec prisma db push
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/stried_test?schema=public

      - name: Run Tests
        run: pnpm --filter api test -- --reporter=default --reporter=junit --outputFile.junit=test-results.xml
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/stried_test?schema=public
          JWT_SECRET: ci-test-secret-key-do-not-use-in-prod

      - name: Publish Test Report
        uses: dorny/test-reporter@57c8c362095f9d146c2459e917d23d905a54db68 # v1.9.1
        if: always()
        with:
          name: Vitest Tests
          path: apps/api/test-results.xml
          reporter: jest-junit
