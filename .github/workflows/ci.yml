name: CI

on:
  push:
    branches:
      - main
      - master
      - dev
      - ci/github-actions
      - ci/gh-actions-automation
  pull_request:
    branches:
      - main
      - master
      - dev

jobs:
  test:
    name: Lint, Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: stride_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d stride_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.3

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache Turborepo Build Cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run Linting
        run: pnpm run lint

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h 127.0.0.1 -p 5432 -U postgres; do
            echo 'Waiting for PostgreSQL to be ready...'
            sleep 2
          done
        env:
          PGPASSWORD: postgres

      - name: Generate Prisma Client
        run: pnpm --filter api exec prisma generate

      - name: Run Database Migrations (CI-safe)
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/stride_test?schema=public
        run: |
          echo "Waiting for PostgreSQL..."
          until pg_isready -h 127.0.0.1 -p 5432 -U postgres; do
            sleep 1
          done

          echo "Generating Prisma client"
          pnpm --filter api exec prisma generate --schema=prisma/schema.prisma

          echo "Pushing database schema (CI-safe)"
          pnpm --filter api exec prisma db push --force-reset --schema=prisma/schema.prisma

      - name: Compile and Build Apps
        run: pnpm run build

      - name: Run Tests
        run: pnpm --filter api test -- --reporter=default --reporter=junit --outputFile.junit=test-results.xml
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/stride_test?schema=public
          JWT_SECRET: ci-test-secret-key-do-not-use-in-prod

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Vitest Tests
          path: apps/api/test-results.xml
          reporter: jest-junit
