name: Create Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get current version
        id: current
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Determine bump type
        id: bump
        run: |
          BUMP=$(npx conventional-recommended-bump -p angular)
          echo "type=$BUMP" >> $GITHUB_OUTPUT

      - name: Calculate next version
        id: next
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          BUMP="${{ steps.bump.outputs.type }}"

          NEXT=$(node -e "
            const semver = require('semver');
            console.log(semver.inc('$CURRENT', '$BUMP'));
          ")

          echo "version=$NEXT" >> $GITHUB_OUTPUT

      - name: Update versions
        run: |
          npm version ${{ steps.next.outputs.version }} --no-git-tag-version

          cd apps/web
          npm version ${{ steps.next.outputs.version }} --no-git-tag-version
          cd ../..

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add package.json apps/web/package.json pnpm-lock.yaml
          git commit -m "chore(release): v${{ steps.next.outputs.version }}"

      - name: Create tag
        run: |
          git tag v${{ steps.next.outputs.version }}

      - name: Push
        run: |
          git push
          git push --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.next.outputs.version }}
          generate_release_notes: true
